<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Car Selector</title>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
    </style>
</head>
<body>

<h2>Select Your Car</h2>

<form action="/submit-car" method="post">
    <!-- Dropdown for Car Model -->
    <div class="form-group">
        <label for="car-model">Car Model:</label>
        <select id="car-model" name="carModel" required>
            <option value="">--Select a Model Test--</option>
            <option value="tesla_model3">Tesla Model 3</option>
            <option value="ford_mustang">Ford Mustang</option>
            <option value="bmw_3series">BMW Test 3 Series</option>
            <option value="toyota_camry">Toyota Camry</option>
        </select>
    </div>

    <!-- Radio Buttons for Year -->
    <div class="form-group">
        <label>Production Year:</label>
        <input type="radio" id="year2024" name="year" value="2024" checked>
        <label for="year2024" style="display:inline; font-weight:normal;">2024</label><br>
        
        <input type="radio" id="year2023" name="year" value="2023">
        <label for="year2023" style="display:inline; font-weight:normal;">2023</label><br>
        
        <input type="radio" id="year2022" name="year" value="2022">
        <label for="year2022" style="display:inline; font-weight:normal;">2022</label>
    </div>

    <button type="submit">Submit</button>
</form>

</body>
</html>
